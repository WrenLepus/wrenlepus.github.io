<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Warren Liu - Image Gallery</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      margin: 0;
      padding: 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
    }

    /* Grid layout */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); /* bigger min width */
      gap: 25px;
    }

    .image-card {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 6px 14px rgba(0,0,0,0);
    }

    .image-card img {
      width: auto;   
      max-width: 100%;  /* let image fill card width */
      height: auto;
      border-radius: 6px;
    }

    .image-desc {
      margin-top: 10px;
      font-size: 15px;  /* slightly bigger text */
      color: #555;
      text-align: center;
    }

        /* --- BUTTONS --- */
    .gradient-btn {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 10px;
      font-weight: bold;
      text-decoration: none;
      color: white;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 6px 14px rgba(0,0,0,0);
    }

    .gradient-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 14px rgba(90, 54, 137, 0.15);
    }

    /* --- PROJECT GRID --- */
    .project-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
    margin-top: 30px;
    }

  </style>
</head>
<body>

  <h1>Warren's Image Gallery</h1>
  <div class="section-buttons"> 
      <a class="gradient-btn" href="projects.html">← Back</a>
  </div>
  <br>
  <div class="image-grid">

    <div class="image-card">
      <img src="pictures/night scene.png" alt="night scene">
      <div class="image-desc">"Night Scene" - 2024</div>
    </div>

    <div class="image-card">
      <img src="pictures/Landscape of Northern Ireland.jpg" alt="kinbane">
      <div class="image-desc">"Kinbane Castle" - 2024</div>
    </div>

    <div class="image-card">
      <img src="pictures/Scene of river in autumn.jpg" alt="river">
      <div class="image-desc">"Beside a River in Autumn" - 2024</div>
    </div>

    <div class="image-card">
      <img src="pictures/pencil sketch 1.jpg" alt="pencil sketch">
      <div class="image-desc">Pencil Sketch of "View of the Łazienki Palace in summer" - 2026</div>
    </div>

    <div class="image-card">
      <img src="pictures/victoria island scene.jpg" alt="victoria">
      <div class="image-desc">"Garden" - 2025</div>
    </div>

    <div class="image-card">
      <img src="pictures/rabbit.jpg" alt="Cute Rabbits">
      <div class="image-desc">"Rabbits" - 2024</div>
    </div>

  </div>

</body>
</html>
